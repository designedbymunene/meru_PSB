version: "3.8"

services:
  db:
    image: postgres:15
    container_name: meru-db
    environment:
      POSTGRES_DB: meru_county_psb
      POSTGRES_USER: meru_county
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meru_county"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: localhost/meru_county_psb_app:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    command: >
      sh -c "npx drizzle-kit migrate --config drizzle.config.ts"
    restart: "no"

  app:
    build: .
    container_name: meru-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://meru_county:${POSTGRES_PASSWORD}@db:5432/meru_county_psb
    volumes:
      - uploads:/app/uploads
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
