version: '3.8'

services:
  db:
    image: postgres:15
    container_name: meru-db
    environment:
      POSTGRES_DB: meru_county_psb
      POSTGRES_USER: meru_county
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meru_county"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: meru-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgres://meru_county:${POSTGRES_PASSWORD}@db:5432/meru_county_psb
    command: >
      sh -c "npx drizzle-kit migrate --config drizzle.config.ts"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: meru-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - apps/backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://meru_county:${POSTGRES_PASSWORD}@db:5432/meru_county_psb
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/apps/backend/uploads
    volumes:
      - uploads:/app/apps/backend/uploads
      - ./apps/backend/sql:/app/apps/backend/sql
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.merucountypublicserviceboard.or.ke
    container_name: meru-web
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
