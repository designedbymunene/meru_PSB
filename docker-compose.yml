version: '3.8'

# IMPORTANT: Safe Rebuild Commands
# ================================
# To rebuild ONLY the frontend (safe - won't affect database):
#   docker compose up -d --build web
#
# To rebuild ONLY the backend API (safe - won't affect database):
#   docker compose up -d --build api
#
# To rebuild everything (CAUTION - may run migrations):
#   docker compose --profile migrate up -d --build
#
# To run migrations manually (when needed):
#   docker compose --profile migrate up migrate
#
# NEVER run: docker compose down && docker compose up -d --build
# This will rebuild everything and potentially destroy your database!

services:
  db:
    image: postgres:15
    container_name: meru-db
    environment:
      POSTGRES_DB: meru_county_psb
      POSTGRES_USER: meru_county
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meru_county"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: meru-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgres://meru_county:${POSTGRES_PASSWORD}@db:5432/meru_county_psb
    command: >
      sh -c "npx drizzle-kit migrate --config drizzle.config.ts"
    restart: "no"
    profiles:
      - manual  # Only run when explicitly enabled: docker compose --profile migrate up migrate

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: meru-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://meru_county:${POSTGRES_PASSWORD}@db:5432/meru_county_psb
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/apps/backend/uploads
    volumes:
      - uploads:/app/apps/backend/uploads
      - ./apps/backend/sql:/app/apps/backend/sql
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.merucountypublicserviceboard.or.ke
      cache_from:
        - web:latest
    container_name: meru-web
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3001
      INTERNAL_BACKEND_URL: http://api:3000
    ports:
      - "3001:3001"
    restart: unless-stopped

  # Database backup service (manual only)
  backup:
    image: postgres:15
    container_name: meru-backup
    environment:
      POSTGRES_DB: meru_county_psb
      POSTGRES_USER: meru_county
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "pg_dump -h db -U meru_county -d meru_county_psb > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backup  # Run: docker compose --profile backup up backup

volumes:
  postgres_data:
  redis_data:
  uploads:
