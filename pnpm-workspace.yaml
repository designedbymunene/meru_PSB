packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@expo/cli@56.1.13'
  - '@expo/package-manager@1.12.1'
  - '@expo/prebuild-config@56.0.14'
  - '@expo/ui@56.0.15'
  - babel-preset-expo@56.0.14
  - expo-linking@56.0.13
  - expo-modules-core@56.0.14
  - expo-notifications@56.0.15
  - expo-router@56.2.8
  - expo@56.0.8
